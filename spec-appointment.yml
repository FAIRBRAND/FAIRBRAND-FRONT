openapi: "3.1.0"
info:
  title: "Fairbrand Appointment"
  description: "Fairbrand Appointment"
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"
paths:
  /api/appointments/verify:
    post:
      summary: "Admin verifies if the appointment request is doable"
      operationId: "verifyAppointmentRequest"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationPayload"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VerifiedAppointment"
  /api/appointments:
    post:
      summary: "Client create an appointment request"
      operationId: "createAnAppointment"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentPayload"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AppointmentInValidation"
    get:
      summary: "get all appointments"
      operationId: "getAllAppointments"
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Appointment"
  /api/appointments/{id}:
    get:
      summary: "get an appointment by id"
      operationId: "getAppointmentById"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Appointment"
    put:
      summary: "The client edits his own appointment"
      operationId: "editAppointmentById"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentPayload"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AppointmentInValidation"
    delete:
      summary: "The client cancels an appointment"
      operationId: "cancelAppointment"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Appointment"
components:
  schemas:
    VerificationPayload:
      type: "object"
      properties:
        appointmentId:
          type: "integer"
          format: "int32"
    Instant:
      type: "string"
      format: "date-time"
    VerifiedAppointment:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
        title:
          type: "string"
        description:
          type: "string"
        startAt:
          type: "string"
          format: "date-time"
        endAt:
          type: "string"
          format: "date-time"
        status:
          type: "string"
          enum:
            - "VERIFY"
            - "BOOKED"
            - "CANCELED"
        createdAt:
          $ref: "#/components/schemas/Instant"
    AppointmentPayload:
      type: "object"
      properties:
        title:
          type: "string"
        description:
          type: "string"
        startAt:
          type: "string"
          format: "zoned-date-time"
        endAt:
          type: "string"
          format: "zoned-date-time"
    AppointmentInValidation:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
        title:
          type: "string"
        description:
          type: "string"
        startAt:
          type: "string"
          format: "date-time"
        endAt:
          type: "string"
          format: "date-time"
        status:
          type: "string"
          enum:
            - "VERIFY"
            - "BOOKED"
            - "CANCELED"
        createdAt:
          $ref: "#/components/schemas/Instant"
    Appointment:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
        startAt:
          type: "string"
          format: "date-time"
        endAt:
          type: "string"
          format: "date-time"
        userId:
          type: "integer"
          format: "int32"
        status:
          type: "string"
          enum:
            - "VERIFY"
            - "BOOKED"
            - "CANCELED"
        title:
          type: "string"
        description:
          type: "string"
        createdAt:
          $ref: "#/components/schemas/Instant"
